<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Neon Guard: Ricochet Protocol</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; cursor: crosshair; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 0 0 10px #0ff; pointer-events: none;
            font-size: 20px; font-weight: bold;
        }
        #hp-ui { color: #f0f; font-size: 18px; margin-top: 5px; }
        #hint { font-size: 14px; color: #0ff; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span>
        <div id="hp-ui">SHIELD: <span id="hp">3</span></div>
        <div id="hint">子彈可反彈 3 次 | 每次反彈威力增加 | 空白鍵：脈衝波</div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpEl = document.getElementById('hp');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol=0.1) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

let score = 0;
let hp = 3;
let isGameOver = false;
let shakeAmount = 0;
let frameCount = 0;
let mousePos = { x: canvas.width/2, y: canvas.height/2 };
let isMouseDown = false;

const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 20,
    pulseCooldown: 0,
    pulseRadius: 0
};

class Projectile {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.radius = 5;
        this.speed = 12;
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;
        this.bounces = 0;
        this.maxBounces = 3;
        this.color = '#0ff';
        this.trail = [];
    }
    update() {
        // 紀錄尾跡
        this.trail.unshift({x: this.x, y: this.y});
        if (this.trail.length > 10) this.trail.pop();

        this.x += this.vx;
        this.y += this.vy;

        // --- 核心：反彈邏輯 ---
        let bounced = false;
        if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
            this.vx *= -1;
            bounced = true;
        }
        if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
            this.vy *= -1;
            bounced = true;
        }

        if (bounced) {
            this.bounces++;
            // 每次反彈改變顏色
            this.color = `hsl(${180 + this.bounces * 40}, 100%, 60%)`;
            playSound(300 + this.bounces * 100, 'sine', 0.05, 0.05);
            shakeAmount = 2;
        }
    }
    draw() {
        // 畫尾跡
        ctx.beginPath();
        this.trail.forEach((pos, index) => {
            ctx.globalAlpha = 1 - (index / this.trail.length);
            ctx.lineTo(pos.x, pos.y);
        });
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.radius;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // 畫子彈頭
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fill();
    }
}

class Enemy {
    constructor() {
        this.radius = Math.random() * 15 + 12;
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(canvas.width, canvas.height);
        this.x = player.x + Math.cos(angle) * dist;
        this.y = player.y + Math.sin(angle) * dist;
        this.speed = Math.random() * 1.5 + 1 + (score/10000);
        this.color = `hsl(${Math.random() * 60 + 330}, 80%, 60%)`;
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
    }
    draw() {
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

let projectiles = [];
let enemies = [];

// 事件監聽
window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
window.addEventListener('mousedown', e => {
    if (e.button === 0) isMouseDown = true;
    if (e.button === 2) triggerPulse();
    if (audioCtx.state === 'suspended') audioCtx.resume();
});
window.addEventListener('mouseup', () => isMouseDown = false);
window.addEventListener('keydown', e => { if (e.code === 'Space') triggerPulse(); });
window.addEventListener('contextmenu', e => e.preventDefault());

function triggerPulse() {
    if (player.pulseCooldown > 0) return;
    player.pulseRadius = 1;
    player.pulseCooldown = 200;
    playSound(100, 'sawtooth', 0.5, 0.2);
    shakeAmount = 15;
}

function gameLoop() {
    if (isGameOver) return;
    frameCount++;
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    if (shakeAmount > 0) {
        ctx.translate(Math.random()*shakeAmount - shakeAmount/2, Math.random()*shakeAmount - shakeAmount/2);
        shakeAmount *= 0.9;
    }

    // 1. 核心（固定）
    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();

    // 2. 脈衝波
    if (player.pulseRadius > 0) {
        player.pulseRadius += 10;
        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - player.pulseRadius/400})`;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.pulseRadius, 0, Math.PI*2); ctx.stroke();
        if (player.pulseRadius > 400) player.pulseRadius = 0;
    }
    if (player.pulseCooldown > 0) player.pulseCooldown--;

    // 3. 射擊
    if (isMouseDown && frameCount % 8 === 0) {
        const aimAngle = Math.atan2(mousePos.y - player.y, mousePos.x - player.x);
        projectiles.push(new Projectile(player.x, player.y, aimAngle));
        playSound(400, 'sine', 0.05);
    }

    // 4. 敵人
    if (frameCount % Math.max(10, 45 - Math.floor(score/1200)) === 0) enemies.push(new Enemy());
    
    enemies.forEach((e, ei) => {
        e.update(); e.draw();

        // 碰撞核心
        if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius) {
            hp--; hpEl.innerText = hp;
            shakeAmount = 20;
            enemies.splice(ei, 1);
            playSound(50, 'square', 0.3, 0.2);
            if (hp <= 0) {
                isGameOver = true;
                alert("彈射核心毀損！ 分數: " + score);
                location.reload();
            }
        }

        // 被子彈擊中
        projectiles.forEach((p, pi) => {
            if (Math.hypot(p.x - e.x, p.y - e.y) < p.radius + e.radius) {
                // 如果反彈過，分數加倍
                const bonus = (p.bounces + 1) * 100;
                score += bonus;
                scoreEl.innerText = score;
                
                enemies.splice(ei, 1);
                // 子彈擊中後才消失
                projectiles.splice(pi, 1);
                shakeAmount = 4;
                playSound(200 + bonus, 'sine', 0.1);
            }
        });

        // 脈衝波彈開敵人
        if (player.pulseRadius > 0) {
            const d = Math.hypot(player.x - e.x, player.y - e.y);
            if (Math.abs(d - player.pulseRadius) < 30) {
                const angle = Math.atan2(e.y - player.y, e.x - player.x);
                e.x += Math.cos(angle) * 100; e.y += Math.sin(angle) * 100;
            }
        }
    });

    // 5. 更新子彈並處理反彈次數上限
    projectiles.forEach((p, pi) => {
        p.update(); p.draw();
        if (p.bounces > p.maxBounces) {
            projectiles.splice(pi, 1);
        }
    });

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
