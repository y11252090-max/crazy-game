<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Neon Blitz: Overload</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 0 0 10px #0ff; pointer-events: none;
            font-size: 20px; font-weight: bold;
        }
        #boss-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 400px; display: none; text-align: center;
        }
        #boss-bar-bg { width: 100%; height: 10px; background: #333; border: 1px solid #f0f; border-radius: 5px; overflow: hidden; }
        #boss-hp { width: 100%; height: 100%; background: #f0f; box-shadow: 0 0 15px #f0f; }
        #weapon-status { color: #ff0; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span>
        <div id="weapon-status">WEAPON: NORMAL</div>
        <div style="font-size: 12px; color: #0ff; margin-top: 5px;">SPACE TO DASH (INVINCIBLE)</div>
    </div>
    <div id="boss-ui">
        <div style="color: #f0f; margin-bottom: 5px;">BOSS DETECTED</div>
        <div id="boss-bar-bg"><div id="boss-hp"></div></div>
    </div>
    <canvas id="game"></canvas>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const weaponEl = document.getElementById('weapon-status');
const bossUI = document.getElementById('boss-ui');
const bossHpBar = document.getElementById('boss-hp');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- 創意核心：Web Audio 音效合成器 ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol=0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// 遊戲狀態
let score = 0;
let isGameOver = false;
let shakeAmount = 0;
let frameCount = 0;
let hitStop = 0; 
let bossActive = false;
let mousePos = { x: canvas.width/2, y: canvas.height/2 };
let keys = {};

// 玩家設定
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 15,
    speed: 6,
    dashCooldown: 0,
    isDashing: false,
    weapon: 'normal',
    weaponTimer: 0
};

class Projectile {
    constructor(x, y, angle, color, radius = 4, speed = 12, isEnemy = false) {
        this.x = x; this.y = y;
        this.radius = radius;
        this.color = color;
        this.velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
        this.isEnemy = isEnemy;
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

class Enemy {
    constructor(isBoss = false) {
        this.isBoss = isBoss;
        this.radius = isBoss ? 60 : Math.random() * 20 + 10;
        this.hp = isBoss ? 50 : 1;
        this.maxHp = this.hp;
        this.color = isBoss ? '#f0f' : `hsl(${Math.random() * 60 + 200}, 80%, 60%)`;
        this.speed = isBoss ? 1 : Math.random() * 2 + 1.5 + (score / 10000);
        
        // 從邊緣生成
        const angle = Math.random() * Math.PI * 2;
        this.x = canvas.width/2 + Math.cos(angle) * canvas.width;
        this.y = canvas.height/2 + Math.sin(angle) * canvas.height;
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;

        // Boss 射擊邏輯
        if (this.isBoss && frameCount % 60 === 0) {
            for(let i=0; i<8; i++) {
                projectiles.push(new Projectile(this.x, this.y, (i/8)*Math.PI*2, '#f0f', 8, 5, true));
            }
            playSound(150, 'sawtooth', 0.3);
        }
    }
    draw() {
        ctx.save();
        ctx.shadowBlur = this.isBoss ? 30 : 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        if (this.isBoss) {
            // Boss 畫成八角形
            for(let i=0; i<8; i++) {
                const a = i * Math.PI / 4;
                const px = this.x + Math.cos(a) * this.radius;
                const py = this.y + Math.sin(a) * this.radius;
                if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath();
        } else {
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.restore();
    }
}

class PowerUp {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 10;
        this.type = Math.random() > 0.5 ? 'shotgun' : 'rapid';
        this.color = this.type === 'shotgun' ? '#ff0' : '#0f0';
    }
    draw() {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.radius = Math.random() * 3;
        this.velocity = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
        this.alpha = 1;
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.02; }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.radius*2, this.radius*2);
        ctx.restore();
    }
}

// 實例化
let projectiles = [];
let enemies = [];
let particles = [];
let powerups = [];

// 事件監聽
window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
window.addEventListener('mousedown', () => { 
    isMouseDown = true;
    if (audioCtx.state === 'suspended') audioCtx.resume();
});
window.addEventListener('mouseup', () => isMouseDown = false);
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.code === 'Space' && player.dashCooldown <= 0) {
        player.isDashing = true;
        player.dashCooldown = 60;
        playSound(600, 'sine', 0.1);
        setTimeout(() => player.isDashing = false, 150);
    }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let isMouseDown = false;

function gameLoop() {
    if (isGameOver) return;
    if (hitStop > 0) { hitStop--; requestAnimationFrame(gameLoop); return; }
    
    frameCount++;
    
    // 渲染背景
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    if (shakeAmount > 0) {
        ctx.translate(Math.random()*shakeAmount - shakeAmount/2, Math.random()*shakeAmount - shakeAmount/2);
        shakeAmount *= 0.9;
    }

    // 玩家更新
    let dx = 0, dy = 0;
    if (keys['w']) dy -= 1; if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1; if (keys['d']) dx += 1;
    const speed = player.isDashing ? player.speed * 4 : player.speed;
    player.x += dx * speed;
    player.y += dy * speed;
    if (player.dashCooldown > 0) player.dashCooldown--;

    // 畫玩家
    ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
    ctx.fill();

    // 處理武器邏輯
    if (player.weaponTimer > 0) {
        player.weaponTimer--;
        if (player.weaponTimer <= 0) {
            player.weapon = 'normal';
            weaponEl.innerText = "WEAPON: NORMAL";
        }
    }

    // 射擊控制
    let fireRate = player.weapon === 'rapid' ? 3 : 6;
    if (isMouseDown && frameCount % fireRate === 0) {
        const angle = Math.atan2(mousePos.y - player.y, mousePos.x - player.x);
        if (player.weapon === 'shotgun') {
            for(let i=-1; i<=1; i++) projectiles.push(new Projectile(player.x, player.y, angle + i*0.2, '#ff0'));
            playSound(200, 'square', 0.1);
        } else {
            projectiles.push(new Projectile(player.x, player.y, angle, '#0ff'));
            playSound(400, 'sine', 0.05);
        }
        shakeAmount = 2;
    }

    // 道具處理
    powerups.forEach((pw, i) => {
        pw.draw();
        if (Math.hypot(player.x - pw.x, player.y - pw.y) < player.radius + pw.radius) {
            player.weapon = pw.type;
            player.weaponTimer = 400;
            weaponEl.innerText = "WEAPON: " + pw.type.toUpperCase();
            powerups.splice(i, 1);
            playSound(800, 'sine', 0.2);
        }
    });

    // 敵人與 Boss 生成
    if (!bossActive && score > 0 && score % 3000 === 0) {
        enemies.push(new Enemy(true));
        bossActive = true;
        bossUI.style.display = 'block';
    } else if (!bossActive && frameCount % 40 === 0) {
        enemies.push(new Enemy());
    }

    // 敵人處理
    enemies.forEach((e, ei) => {
        e.update();
        e.draw();

        // 碰撞玩家
        const dToP = Math.hypot(player.x - e.x, player.y - e.y);
        if (dToP < player.radius + e.radius && !player.isDashing) {
            isGameOver = true;
            playSound(100, 'sawtooth', 0.5, 0.3);
            alert("遊戲結束！分數: " + score);
            location.reload();
        }

        // 子彈撞敵人
        projectiles.forEach((p, pi) => {
            if (p.isEnemy) return;
            const dToE = Math.hypot(p.x - e.x, p.y - e.y);
            if (dToE < p.radius + e.radius) {
                e.hp--;
                projectiles.splice(pi, 1);
                for(let i=0; i<5; i++) particles.push(new Particle(p.x, p.y, e.color));
                
                if (e.hp <= 0) {
                    if (e.isBoss) {
                        score += 1000;
                        bossActive = false;
                        bossUI.style.display = 'none';
                        shakeAmount = 30;
                        hitStop = 15; // 擊殺 Boss 瞬間卡頓
                        for(let i=0; i<50; i++) particles.push(new Particle(e.x, e.y, e.color));
                        playSound(50, 'sawtooth', 0.8, 0.5);
                        // 必定掉落武器
                        powerups.push(new PowerUp(e.x, e.y));
                    } else {
                        score += 100;
                        if (Math.random() < 0.1) powerups.push(new PowerUp(e.x, e.y));
                        playSound(150, 'sine', 0.1);
                    }
                    enemies.splice(ei, 1);
                    scoreEl.innerText = score;
                } else if (e.isBoss) {
                    bossHpBar.style.width = (e.hp / e.maxHp * 100) + "%";
                }
            }
        });
    });

    // 敵方子彈撞玩家
    projectiles.forEach((p, pi) => {
        p.update(); p.draw();
        if (p.isEnemy && Math.hypot(player.x - p.x, player.y - p.y) < player.radius + p.radius && !player.isDashing) {
            isGameOver = true;
            alert("你被子彈擊中了！");
            location.reload();
        }
        if (p.x<0 || p.x>canvas.width || p.y<0 || p.y>canvas.height) projectiles.splice(pi, 1);
    });

    particles.forEach((p, i) => {
        p.update(); p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    });

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
